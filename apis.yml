- name: Oracle Financial Consolidation and Close REST API
  description: >-
    REST API for Oracle Financial Consolidation and Close Cloud Service (FCCS).
    Provides endpoints for retrieving and managing journals, submitting,
    approving, posting, and rejecting journals, updating journal periods,
    importing supplementation data, copying and clearing data, and deploying
    form templates.
