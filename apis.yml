modified: '2026-03-16'
specificationVersion: '0.19'
apis:
- name: Oracle Planning REST API
  description: >-
    RESTful API for Oracle Planning and Budgeting Cloud Service providing access
    to planning applications, data, and metadata. Use the Planning REST APIs to
    manage and execute jobs, work with members, applications, planning units,
    user preferences, data slices, substitution variables, and user variables.
  image: https://www.oracle.com/a/ocom/img/oracle-logo.png
  humanURL: https://docs.oracle.com/en/cloud/saas/planning-budgeting-cloud/index.html
  baseURL: https://{serviceHost}/HyperionPlanning/rest
  tags:
  - Planning
  - Budgeting
  - Forecasting
  - EPM
  - Cloud
