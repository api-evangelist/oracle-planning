- name: Oracle Account Reconciliation REST API
  description: >-
    REST API for Oracle Account Reconciliation Cloud Service (ARCS). Provides
    endpoints for creating reconciliations, changing period status, importing
    pre-mapped transactions, importing profiles, importing currency rates,
    importing balances, monitoring reconciliations, and retrieving job status.
    Also supports Transaction Matching for importing and auto-matching
    transactions.
  image: https://www.oracle.com/a/ocom/img/oracle-logo.png
  humanURL: https://docs.oracle.com/en/cloud/saas/account-reconcile-cloud/
  baseURL: https://{serviceHost}/armARCS/rest
