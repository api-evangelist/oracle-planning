- name: Oracle EPM Groovy Scripting API
  description: >-
    Java-based scripting API for Oracle EPM Cloud that enables Groovy scripts
    to perform operations against the EPM object model. Allows dynamic
    generation of calculation scripts at runtime, validation checks for
    runtime prompts, data validation before form submissions, and
    integration with internal and external REST APIs.
  image: https://www.oracle.com/a/ocom/img/oracle-logo.png
