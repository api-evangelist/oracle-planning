  description: >-
    API for integrating Oracle Smart View for Office with Oracle Planning
    applications. Smart View provides a common Microsoft Office interface for
    EPM products, allowing users to view, import, manipulate, distribute, and
    share data in Excel, Word, and PowerPoint.
