aid: oracle-planning
name: Oracle Planning APIs
description: >-
  A collection of APIs for Oracle Planning and Budgeting Cloud Service (PBCS)
  and Enterprise Performance Management (EPM) Planning. Oracle EPM Cloud
  provides REST APIs across planning, budgeting, forecasting, financial
  consolidation, account reconciliation, tax reporting, narrative reporting,
  profitability and cost management, and enterprise data management services.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
