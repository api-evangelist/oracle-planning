- name: Oracle EPM Automate
  description: >-
    Command-line utility for automating Oracle EPM Cloud administration tasks.
    EPM Automate enables service administrators to remotely perform tasks
    including importing and exporting metadata, data, artifact and application
    snapshots, uploading and managing files, and downloading reports.
  image: https://www.oracle.com/a/ocom/img/oracle-logo.png
