description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: oracle-planning-free
    name: Free
    type: freemium
    description: Free entry tier for the Oracle Planning API surface. Intended for evaluation, prototyping,
      and low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://{serviceHost}/HyperionPlanning/rest
          - https://{serviceHost}
          - https://{serviceHost}/aif/rest
          - https://{serviceHost}/interop/rest
          - https://{serviceHost}/interop/rest/security
          - https://{serviceHost}/armARCS/rest
          - https://{serviceHost}/epm/rest
          - https://{serviceHost}/HyperionPlanning/rest/v3
          - https://{serviceHost}/HyperionPlanning/rest/cmapi
          - https://{serviceHost}/HyperionPlanning/rest/ej
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
